name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux GNU
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin_ext: ""

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            bin_ext: ""

          # Linux MUSL, better for old servers such as Ubuntu 20.04
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            bin_ext: ""

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            bin_ext: ""

          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            bin_ext: ""

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            bin_ext: ""

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin_ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux GNU ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure Linux GNU ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Install MUSL tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Linux MUSL ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld

      - name: Configure Linux MUSL ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "rust-lld"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euxo pipefail

          VERSION="${GITHUB_REF_NAME}"
          NAME="swatch-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${NAME}"

          cp "target/${{ matrix.target }}/release/swatch" "dist/${NAME}/swatch"
          cp README.md "dist/${NAME}/" || true
          cp LICENSE "dist/${NAME}/" || true
          cp LICENSE.md "dist/${NAME}/" || true

          cd dist
          tar -czf "${NAME}.tar.gz" "${NAME}"

      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $Version = "${env:GITHUB_REF_NAME}"
          $Name = "swatch-$Version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$Name"

          Copy-Item "target/${{ matrix.target }}/release/swatch.exe" "dist/$Name/swatch.exe"

          if (Test-Path "README.md") {
            Copy-Item "README.md" "dist/$Name/"
          }

          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" "dist/$Name/"
          }

          if (Test-Path "LICENSE.md") {
            Copy-Item "LICENSE.md" "dist/$Name/"
          }

          Compress-Archive -Path "dist/$Name" -DestinationPath "dist/$Name.zip"

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
